name: Build and Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/math105-build-env:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Ensure required TeX fonts are available
        run: |
          if ! kpsewhich putb8a.pfb >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends texlive-fonts-extra texlive-fonts-extra-links
            mktexlsr
          fi

      - name: Build site
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
